<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Molduras</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <h1>Galeria de Molduras</h1>
    <div class="galeria" id="galeria"></div>
    <div class="popup" id="popup" style="display: none;">
        <span class="fechar" onclick="fecharPopup()">&times;</span>
        <span class="nav prev" onclick="navegar(-1)">&#10094;</span>
        <img id="imagemPopup" src="" alt="">
        <span class="nav next" onclick="navegar(1)">&#10095;</span>
        <a id="montagemLink" href="#" class="montagem-btn">Fazer Montagem</a>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const imagens = [
                { url: "https://lh5.googleusercontent.com/-xQftWSAXNpU/VB3oQbFWudI/AAAAAAAAEeM/Qu_HnHbZLB0/s0/anjoAnjinhafeliz.png", titulo: "Anjinha Feliz" },
                { url: "https://lh5.googleusercontent.com/-3SwcpROrcn8/VB3oQVnuZWI/AAAAAAAAEeE/CUk37kJQ6nU/s0/anjoanjinhosecachorrinho.png", titulo: "Anjinhos" },
                { url: "https://lh5.googleusercontent.com/-zKBwRaOFaTY/VB3oQ4_QPVI/AAAAAAAAEeQ/X2EutKEGs-s/s0/anjopalito.png", titulo: "Anjinho" }
            ];

            const galeria = document.getElementById("galeria");

            imagens.forEach((img, index) => {
                const div = document.createElement("div");
                div.classList.add("imagem");
                div.innerHTML = `<img src="${img.url}" alt="${img.titulo}" onclick="abrirPopup(${index})">`;
                galeria.appendChild(div);
            });
        });
    </script>
</body>
</html>
